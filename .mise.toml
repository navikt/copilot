# Root-level mise tasks for the monorepo
# These tasks orchestrate running tasks across all apps
[tools]
"go:github.com/sethvargo/ratchet" = "latest"

[tasks."ratchet:pin"]
description = "Pin GitHub Actions to specific commit SHAs"
run = "ratchet pin .github/workflows/*.y?ml"

[tasks."ratchet:update"]
description = "Update pinned GitHub Actions to latest versions"
run = "ratchet update .github/workflows/*.y?ml"

[tasks."ratchet:lint"]
description = "Check if GitHub Actions are properly pinned"
run = "ratchet lint .github/workflows/*.y?ml"

[tasks."ratchet:unpin"]
description = "Unpin GitHub Actions (restore to tags)"
run = "ratchet unpin .github/workflows/*.y?ml"

[tasks.check]
description = "Run all checks across all apps"
run = '''
#!/usr/bin/env bash
set -e

echo "🔍 Running checks across all apps..."
echo ""

echo "📦 mcp-onboarding:"
(cd apps/mcp-onboarding && mise check)
echo ""

echo "📦 mcp-registry:"
(cd apps/mcp-registry && mise check)
echo ""

echo "📦 copilot-metrics:"
(cd apps/copilot-metrics && mise check)
echo ""

echo "📦 my-copilot:"
(cd apps/my-copilot && mise check)
echo ""

echo "✅ All checks passed"
'''

[tasks.test]
description = "Run tests across all apps"
run = '''
#!/usr/bin/env bash
set -e

echo "🧪 Running tests across all apps..."
echo ""

echo "📦 mcp-onboarding:"
(cd apps/mcp-onboarding && mise test)
echo ""

echo "📦 mcp-registry:"
(cd apps/mcp-registry && mise test)
echo ""

echo "📦 copilot-metrics:"
(cd apps/copilot-metrics && mise test)
echo ""

echo "📦 my-copilot:"
(cd apps/my-copilot && mise test)
echo ""

echo "✅ All tests passed"
'''

[tasks.build]
description = "Build all apps"
run = '''
#!/usr/bin/env bash
set -e

echo "🔨 Building all apps..."
echo ""

echo "📦 mcp-onboarding:"
(cd apps/mcp-onboarding && mise build)
echo ""

echo "📦 mcp-registry:"
(cd apps/mcp-registry && mise build)
echo ""

echo "📦 copilot-metrics:"
(cd apps/copilot-metrics && mise build)
echo ""

echo "📦 my-copilot:"
(cd apps/my-copilot && mise build)
echo ""

echo "✅ All apps built successfully"
'''

[tasks.all]
description = "Run all checks, tests, and builds across all apps"
depends = ["check", "test", "build"]
