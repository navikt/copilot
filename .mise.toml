# Root-level mise tasks for the monorepo
#
# Orchestrates running tasks across all applications.
# Each app defines its own tasks in apps/<name>/.mise.toml.
#
# Standard tasks (delegated to each app):
#   check, test, build, update
#
# Selective tasks (only apps that need them):
#   generate — mcp-onboarding, my-copilot
#
# Root-only tasks:
#   docs:*    — documentation generation and checking
#   ratchet:* — GitHub Actions SHA pinning
#   all       — full pipeline: generate → check → build

[tools]
"go:github.com/sethvargo/ratchet" = "latest"
shellcheck = "latest"

[env]
APPS = "copilot-adoption copilot-metrics mcp-onboarding mcp-registry my-copilot"
APPS_WITH_GENERATE = "mcp-onboarding my-copilot"

# ─── Pipeline ────────────────────────────────────────────────────────────────

[tasks.all]
description = "Full pipeline: generate, check, build"
run = "bash hack/all.sh"

# ─── Standard tasks (delegated to all apps) ──────────────────────────────────

[tasks.check]
description = "Run all checks across all apps"
run = "bash hack/check.sh"

[tasks.test]
description = "Run tests across all apps"
run = "bash hack/test.sh"

[tasks.build]
description = "Build all apps"
run = "bash hack/build.sh"

[tasks.update]
description = "Update dependencies across all apps"
run = "bash hack/update.sh"

# ─── Generate (only apps that have generate tasks) ───────────────────────────

[tasks.generate]
description = "Generate all generated files"
run = "bash hack/generate.sh"

# ─── Docs ────────────────────────────────────────────────────────────────────

[tasks."docs:generate"]
description = "Generate docs from customization files"
run = "(cd scripts/generate-docs && go run .)"

[tasks."docs:check"]
description = "Check if docs are in sync with customization files"
run = "(cd scripts/generate-docs && go run . --check)"

# ─── Skills ──────────────────────────────────────────────────────────────────

[tasks."skills:lint"]
description = "Lint .github/skills/ for quality (token budget, structure, metadata)"
run = "bash scripts/lint-skills.sh"

# ─── nav-pilot installer ─────────────────────────────────────────────────────

[tasks."nav-pilot:build"]
description = "Build nav-pilot installer CLI"
run = """
LDFLAGS="-X main.version=dev -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
(cd cli/nav-pilot && go build -ldflags "$LDFLAGS" -o nav-pilot .)
"""

[tasks."nav-pilot:test"]
description = "Run nav-pilot installer tests"
run = "(cd cli/nav-pilot && go test -race -v ./...)"

[tasks."nav-pilot:check"]
description = "Run all nav-pilot checks (mirrors CI: build, test, vet, staticcheck, shellcheck)"
run = """
echo "  build..."   && cd cli/nav-pilot && go build -o /dev/null . && \
echo "  test..."    && go test -race ./... && \
echo "  vet..."     && go vet ./... && \
echo "  staticcheck..." && staticcheck ./... && \
cd ../.. && \
echo "  shellcheck..." && shellcheck scripts/install.sh && \
echo "  ✅ nav-pilot checks passed"
"""

[tasks."nav-pilot:install"]
description = "Build and install nav-pilot CLI to GOBIN"
run = """
LDFLAGS="-X main.version=dev -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
cd cli/nav-pilot && go build -ldflags "$LDFLAGS" -o nav-pilot .
DEST="${GOBIN:-${GOPATH:-$HOME/go}/bin}"
mkdir -p "$DEST"
mv nav-pilot "$DEST/nav-pilot"
echo "✓ Installed nav-pilot to $DEST/nav-pilot"
"""

# ─── Ratchet (GitHub Actions pinning) ────────────────────────────────────────

[tasks."ratchet:pin"]
description = "Pin GitHub Actions to specific commit SHAs"
run = "ratchet pin .github/workflows/*.y?ml"

[tasks."ratchet:update"]
description = "Update pinned GitHub Actions to latest versions"
run = "ratchet update .github/workflows/*.y?ml"

[tasks."ratchet:lint"]
description = "Check if GitHub Actions are properly pinned"
run = "ratchet lint .github/workflows/*.y?ml"

[tasks."ratchet:unpin"]
description = "Unpin GitHub Actions (restore to tags)"
run = "ratchet unpin .github/workflows/*.y?ml"
