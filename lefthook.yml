# https://github.com/evilmartians/lefthook
# Install hooks: lefthook install

pre-commit:
  parallel: true
  commands:
    # Regenerate the app manifests and docs tables whenever a source file
    # (agent/skill/instruction/prompt/collection) changes. These outputs embed
    # a contentHash of each file, so an edit that isn't regenerated fails the
    # `generate:check` and `Docs in sync` CI jobs. Keeps them in sync at commit.
    generated-files:
      glob: "{agents,collections,instructions,prompts,skills}/**"
      run: |
        mise run generate
        git add \
          apps/my-copilot/src/lib/copilot-manifest.json \
          apps/mcp-onboarding/internal/discovery/copilot-manifest.json \
          docs/README.agents.md docs/README.instructions.md \
          docs/README.prompts.md docs/README.skills.md README.md

    gofmt:
      glob: "**/*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

    shellcheck:
      glob: "**/*.sh"
      run: shellcheck {staged_files}

    eslint:
      root: "apps/my-copilot"
      glob: "**/*.{ts,tsx}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

    prettier:
      root: "apps/my-copilot"
      glob: "**/*.{ts,tsx,js,json,css,md}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    conventional-commits:
      run: |
        msg=$(cat {1})
        # Skip merge commits
        echo "$msg" | grep -qE '^Merge ' && exit 0
        # Validate conventional commit format on subject line
        if ! echo "$msg" | head -1 | grep -qE '^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\(.+\))?(!)?: .+'; then
          echo "❌ Commit message must follow Conventional Commits format"
          echo "   See: https://www.conventionalcommits.org"
          echo ""
          echo "   Examples:"
          echo "     feat(my-copilot): add usage dashboard"
          echo "     fix: correct token validation"
          echo "     chore(deps): update go modules"
          exit 1
        fi
