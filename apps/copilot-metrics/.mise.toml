[tools]
go = "1.26"
golangci-lint = "2.10.1"
fnox = "latest"

[env]
GITHUB_ORG = "navikt"
GITHUB_ENTERPRISE_SLUG = "nav"
GCP_TEAM_PROJECT_ID = "copilot-dev-e17a"
BIGQUERY_DATASET = "copilot_metrics"
BIGQUERY_TABLE = "usage_metrics"

[tasks.version]
description = "Generate version string (YYYYMMDD-gitsha)"
run = "echo $(date +%Y.%m.%d)-$(date +%H.%M)-$(git rev-parse --short HEAD)"

[tasks.install]
description = "Download dependencies"
run = "go mod download"

[tasks.update]
description = "Update all Go dependencies"
run = ["go get -u ./...", "go mod tidy"]

[tasks.build]
description = "Build the Go application"
run = "go build -o bin/copilot-metrics ."

[tasks.test]
description = "Run all tests with verbose output"
run = "go test -v ./..."

[tasks."test:coverage"]
description = "Run tests with coverage report"
run = [
  "go test -v -cover -coverprofile=coverage.out ./...",
  "go tool cover -html=coverage.out -o coverage.html",
  "echo 'Coverage report: coverage.html'",
]

[tasks."test:short"]
description = "Run tests without verbose output"
run = "go test ./..."

[tasks.lint]
description = "Run linters (golangci-lint)"
run = "golangci-lint run ./..."

[tasks."lint:fix"]
description = "Run linters and auto-fix issues"
run = "golangci-lint run --fix ./..."

[tasks.fmt]
description = "Format code with gofmt"
run = ["gofmt -w .", "go mod tidy"]

[tasks.vet]
description = "Run go vet for static analysis"
run = "go vet ./..."

[tasks.staticcheck]
description = "Run staticcheck for advanced static analysis"
run = "go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./..."

[tasks.check]
description = "Run all checks (fmt, vet, staticcheck, lint, test)"
depends = ["fmt", "vet", "staticcheck", "lint", "test:short"]

[tasks.all]
description = "Run all checks, build, test and docker build"
depends = ["check", "build", "test", "docker:build"]

[tasks.run]
description = "Run the application locally"
run = "fnox exec -- go run ."

[tasks.dev]
description = "Run with development settings (DEBUG log level)"
env = { LOG_LEVEL = "INFO" }
run = "fnox exec -- go run ."

[tasks."run:once"]
description = "Run single ingestion for yesterday"
env = { LOG_LEVEL = "INFO" }
run = "fnox exec -- go run . --run-once"

[tasks."run:once:prod"]
description = "Run single ingestion for yesterday (prod) — also recreates/updates BigQuery views"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-prod-c697" }
run = "fnox exec -- go run . --run-once"

[tasks."backfill:usage"]
description = "Backfill usage metrics only (dev)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-dev-e17a" }
run = "fnox exec -- go run . --backfill --backfill-from=${BACKFILL_FROM:-2025-10-10} --force"

[tasks."backfill:usage:prod"]
description = "Backfill usage metrics only (prod)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-prod-c697" }
run = "fnox exec -- go run . --backfill --backfill-from=${BACKFILL_FROM:-2025-10-10} --force"

[tasks."backfill:billing-monthly"]
description = "Backfill monthly billing usage only (dev)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-dev-e17a" }
run = "FROM=${BACKFILL_FROM:-2026-03-01}; fnox exec -- go run . --billing-monthly-backfill --billing-monthly-from=${FROM:0:7} --force"

[tasks."backfill:billing-monthly:prod"]
description = "Backfill monthly billing usage only (prod)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-prod-c697" }
run = "FROM=${BACKFILL_FROM:-2026-03-01}; fnox exec -- go run . --billing-monthly-backfill --billing-monthly-from=${FROM:0:7} --force"

[tasks."backfill:billing-daily-report"]
description = "Backfill daily billing usage report rows only (dev)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-dev-e17a" }
run = "fnox exec -- go run . --billing-daily-report-backfill --billing-daily-report-from=${BACKFILL_FROM:-2025-10-10} --force"

[tasks."backfill:billing-daily-report:prod"]
description = "Backfill daily billing usage report rows only (prod)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-prod-c697" }
run = "fnox exec -- go run . --billing-daily-report-backfill --billing-daily-report-from=${BACKFILL_FROM:-2025-10-10} --force"

[tasks."backfill:billing-model-daily"]
description = "Backfill daily model billing usage only (dev)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-dev-e17a" }
run = "fnox exec -- go run . --billing-model-daily-backfill --billing-model-daily-from=${BACKFILL_FROM:-2025-10-10} --force"

[tasks."backfill:billing-model-daily:prod"]
description = "Backfill daily model billing usage only (prod)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-prod-c697" }
run = "fnox exec -- go run . --billing-model-daily-backfill --billing-model-daily-from=${BACKFILL_FROM:-2025-10-10} --force"

[tasks."backfill:all"]
description = "Backfill usage metrics + monthly billing + daily billing usage reports + daily model billing (dev)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-dev-e17a" }
run = [
  "fnox exec -- go run . --backfill --backfill-from=${BACKFILL_FROM:-2025-10-10} --force",
  "FROM=${BACKFILL_FROM:-2026-03-01}; fnox exec -- go run . --billing-monthly-backfill --billing-monthly-from=${FROM:0:7} --force",
  "fnox exec -- go run . --billing-daily-report-backfill --billing-daily-report-from=${BACKFILL_FROM:-2025-10-10} --force",
  "fnox exec -- go run . --billing-model-daily-backfill --billing-model-daily-from=${BACKFILL_FROM:-2025-10-10} --force",
]

[tasks."backfill:all:prod"]
description = "Backfill usage metrics + monthly billing + daily billing usage reports + daily model billing (prod)"
env = { LOG_LEVEL = "INFO", GCP_TEAM_PROJECT_ID = "copilot-prod-c697" }
run = [
  "fnox exec -- go run . --backfill --backfill-from=${BACKFILL_FROM:-2025-10-10} --force",
  "FROM=${BACKFILL_FROM:-2026-03-01}; fnox exec -- go run . --billing-monthly-backfill --billing-monthly-from=${FROM:0:7} --force",
  "fnox exec -- go run . --billing-daily-report-backfill --billing-daily-report-from=${BACKFILL_FROM:-2025-10-10} --force",
  "fnox exec -- go run . --billing-model-daily-backfill --billing-model-daily-from=${BACKFILL_FROM:-2025-10-10} --force",
]

[tasks."docker:build"]
description = "Build Docker image"
run = "docker build -t copilot-metrics:local ."

[tasks."docker:run"]
description = "Run Docker container (requires env vars)"
run = "bash hack/docker-run.sh"
