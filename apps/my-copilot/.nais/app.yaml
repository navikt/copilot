apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: "my-copilot"
  namespace: "copilot"
  annotations:
    "nais.io/run-as-group": "65532"
    "nais.io/run-as-user": "65532"
spec:
  image: {{image}}
  port: 3000
  azure:
    application:
      enabled: true
      tenant: nav.no
      allowAllUsers: true
      claims:
        groups:
          - id: 48120347-8582-4329-8673-7beb3ed6ca06 # dev
          - id: 76e9ee7e-2cd1-4814-b199-6c0be007d7b4 # dev
          - id: eb5c5556-6c9a-4e54-83fc-f70cae25358d # dev
          - id: 879f302e-73e9-48bf-8103-16edd8606c4a # infra
          - id: afcbfed4-d5d4-4964-8db5-f59b6f61b929 # azure
          - id: 8396d3ec-e263-49c7-b72a-87440d7ee3f4 # design
    sidecar:
      enabled: true
      autoLogin: true
      autoLoginIgnorePaths:
      # Static assets
      - /_next/**
      - /public/**
      - /demos/**
      - /videos/**
      - /*.svg
      - /*.png
      - /favicon.ico
      - /robots.txt
      - /sitemap.xml
      # OAuth endpoints (handled by Wonderwall sidecar)
      - /oauth2/**
      # All page routes — auth is handled in the application layer.
      # This lets Next.js show login redirects instead of raw Wonderwall intercepts.
      - /
      - /nyheter
      - /nyheter/**
      - /praksis
      - /praksis/**
      - /verktoy
      - /verktoy/**
      - /ordliste
      - /ordliste/**
      - /nav-pilot
      - /nav-pilot/**
      - /cplt
      - /cplt/**
      - /kom-i-gang
      - /kom-i-gang/**
      - /retningslinjer
      - /retningslinjer/**
      - /install
      - /install/**
      - /personvern
      - /tilgjengelighet
      - /statistikk
      - /statistikk/**
      - /adopsjon
      - /adopsjon/**
      - /kostnad
      - /kostnad/**
      - /abonnement
      - /abonnement/**
      - /kalkulator
      - /kalkulator/**
      # Health (metrics NOT listed — Wonderwall blocks public access, Prometheus scrapes pod directly)
      - /health
      # NOTE: /api/copilot and /api/adoption are NOT listed — Wonderwall enforces auth for APIs
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: loki
  frontend:
    generatedConfig:
      mountPath: /tmp/nais.js
  envFrom:
    - secret: my-copilot
  env:
    - name: "NODE_ENV"
      value: "production"
    - name: "GITHUB_ORG"
      value: "navikt"
    - name: "NEXT_TELEMETRY_DISABLED"
      value: "1"
    - name: OTEL_METRICS_EXPORTER
      value: otlp
    - name: OTEL_LOGS_EXPORTER
      value: otlp
    - name: OTEL_TRACES_EXPORTER
      value: otlp
    - name: OTEL_EXPORTER_METRICS_ENABLED
      value: "true"
    - name: OTEL_METRICS_EXEMPLAR_FILTER
      value: ALWAYS_ON
    - name: MCP_REGISTRY_URL
      value: "{{mcp_registry_url}}"
    - name: COPILOT_API_URL
      value: "http://copilot-api"
    - name: BIGQUERY_DATASET
      value: "copilot_metrics"
    - name: BIGQUERY_TABLE
      value: "usage_metrics"
  liveness:
    path: "/health"
    port: 3000
  readiness:
    path: "/health"
    port: 3000
  replicas:
    min: 1
    max: 1
  prometheus:
    enabled: true
    path: "/metrics"
  resources:
    limits:
      memory: "512Mi"
    requests:
      cpu: "10m"
      memory: "128Mi"
  gcp:
    bigQueryDatasets:
      - name: copilot_metrics
        permission: READ
      - name: copilot_adoption
        permission: READ
  accessPolicy:
    outbound:
      rules:
        - application: copilot-api
          namespace: copilot
      external:
        - host: api.github.com
        - host: avatars.githubusercontent.com
        - host: login.microsoftonline.com
        - host: {{mcp_registry_host}}
        - host: bigquery.googleapis.com
        - host: storage.googleapis.com
        - host: raw.githubusercontent.com
  filesFrom:
    - emptyDir:
        medium: Memory
      mountPath: /app/.next/cache
  ingresses:
  {{#each ingresses as |url|}}
    - {{url}}
  {{/each}}
