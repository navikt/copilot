[tools]
node = "24"
pnpm = "10.24.0"
fnox = "latest"

[env]
GITHUB_ORG = "navikt"
GCP_TEAM_PROJECT_ID = "copilot-dev-e17a"
NAIS_FRONTEND_TELEMETRY_COLLECTOR_URL = "https://telemetry.ekstern.dev.nav.no/collect"
DEV_USER_GROUPS = "48120347-8582-4329-8673-7beb3ed6ca06"

[tasks.version]
run = 'echo "$(date +%Y%m%d)-$(git rev-parse --short HEAD)"'
description = "Generate version string"

[tasks.install]
run = "pnpm install --frozen-lockfile"
description = "Install dependencies"

[tasks.update]
run = "pnpm update"
description = "Update all pnpm dependencies"

[tasks.lint]
run = "pnpm lint"
description = "Run ESLint"

[tasks.check]
run = "pnpm check"
depends = ["generate:check"]
description = "Run lint, typecheck, and tests"

[tasks.test]
run = "pnpm test"
description = "Run Jest tests"

[tasks.build]
run = "pnpm build"
description = "Build Next.js production bundle"

[tasks.dev]
run = "fnox exec -- pnpm dev"
description = "Start Next.js development server (secrets from Keychain)"

[tasks."dev:auth"]
run = "pnpm tsx scripts/mock-texas.ts & sleep 1 && NAIS_TOKEN_INTROSPECTION_ENDPOINT=http://localhost:6969/introspect fnox exec -- pnpm dev"
description = "Start dev server with mock Texas (tests auth flows locally)"

[tasks.generate]
run = "pnpm generate && pnpm prettier --write src/lib/copilot-manifest.json"
description = "Generate customizations manifest from .github files"

[tasks."generate:check"]
description = "Check if generated manifest is up to date"
run = "bash hack/generate-check.sh"

[tasks.knip]
run = "pnpm knip"
description = "Find unused files, dependencies and exports"

[tasks."video:publish"]
run = "pnpm tsx scripts/publish-video.ts"
description = "Upload video assets with gsutil and update the GCS video manifest (set VIDEO_PUBLISH_ENV)"

[tasks."video:publish:dev"]
env = { VIDEO_PUBLISH_ENV = "dev" }
run = "pnpm tsx scripts/publish-video.ts"
description = "Publish video assets to the dev bucket and update the dev GCS manifest"

[tasks."video:publish:prod"]
env = { VIDEO_PUBLISH_ENV = "prod" }
run = "pnpm tsx scripts/publish-video.ts"
description = "Publish video assets to the prod bucket and update the prod GCS manifest"
