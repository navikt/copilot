[tools]
node = "24"
pnpm = "10.24.0"
fnox = "latest"

[env]
GITHUB_ORG = "navikt"
GCP_TEAM_PROJECT_ID = "copilot-dev-e17a"
NAIS_FRONTEND_TELEMETRY_COLLECTOR_URL = "https://telemetry.ekstern.dev.nav.no/collect"
DEV_USER_GROUPS = "48120347-8582-4329-8673-7beb3ed6ca06"
VIDEO_BUCKET_PUBLIC_DEV = "copilot-videos-public-dev"
VIDEO_BUCKET_PUBLIC_PROD = "copilot-videos-public-prod"
VIDEO_BUCKET_PUBLIC = "copilot-videos-public-dev"

[tasks.version]
run = 'echo "$(date +%Y%m%d)-$(git rev-parse --short HEAD)"'
description = "Generate version string"

[tasks.install]
run = "pnpm install --frozen-lockfile"
description = "Install dependencies"

[tasks.update]
run = "pnpm update"
description = "Update all pnpm dependencies"

[tasks.lint]
run = "pnpm lint"
description = "Run ESLint"

[tasks.check]
run = "pnpm check"
depends = ["generate:check"]
description = "Run lint, typecheck, and tests"

[tasks.test]
run = "pnpm test"
description = "Run Jest tests"

[tasks.build]
run = "pnpm build"
description = "Build Next.js production bundle"

[tasks.dev]
run = "fnox exec -- pnpm dev"
description = "Start Next.js development server (secrets from Keychain)"

[tasks."dev:auth"]
run = "pnpm tsx scripts/mock-texas.ts & sleep 1 && NAIS_TOKEN_INTROSPECTION_ENDPOINT=http://localhost:6969/introspect fnox exec -- pnpm dev"
description = "Start dev server with mock Texas (tests auth flows locally)"

[tasks.generate]
run = "pnpm generate && pnpm prettier --write src/lib/copilot-manifest.json"
description = "Generate customizations manifest from .github files"

[tasks."generate:check"]
description = "Check if generated manifest is up to date"
run = "bash hack/generate-check.sh"

[tasks.knip]
run = "pnpm knip"
description = "Find unused files, dependencies and exports"

[tasks."video:publish"]
run = "node --experimental-strip-types scripts/publish-video.ts"
description = "Upload video assets (gcloud storage first, gsutil fallback) and update the GCS video manifest (set VIDEO_PUBLISH_ENV)"

[tasks."video:publish:dev"]
env = { VIDEO_PUBLISH_ENV = "dev" }
run = "node --experimental-strip-types scripts/publish-video.ts"
description = "Publish video assets to the dev bucket and update the dev GCS manifest"

[tasks."video:publish:prod"]
env = { VIDEO_PUBLISH_ENV = "prod" }
run = "node --experimental-strip-types scripts/publish-video.ts"
description = "Publish video assets to the prod bucket and update the prod GCS manifest"

[tasks."video:prepare"]
run = "node --experimental-strip-types scripts/prepare-video-package.ts"
description = "Convert an MP4 into a publish-ready video package with poster, HLS, and a helper script"

[tasks."video:episode1:prepare"]
run = 'node --experimental-strip-types scripts/prepare-video-package.ts --input "videos/nav-pilot.s01e01.prompt.mp4" --id "nav-pilot-s01e01-prompt" --title "Presis prompt på første forsøk" --description "Viser hvordan en presis første prompt gir færre runder og lavere tokenkost." --category "copilot" --language "nb" --duration-sec 165 --sort-order 10 --published-at "2026-06-06T14:15:29.298Z" --series "video-demoer-kost-token-optimalisering" --season 1 --episode 1 --tags "prompting,cost,copilot-cli" --output-dir "video-packages/nav-pilot-s01e01-prompt"'
description = "Regenerate episode 1 package with canonical metadata"

[tasks."video:episode1:publish:dev"]
env = { VIDEO_BUCKET_PUBLIC = "copilot-videos-public-dev", VIDEO_BUCKET_PUBLIC_DEV = "copilot-videos-public-dev" }
run = "bash video-packages/nav-pilot-s01e01-prompt/publish.sh"
description = "Publish episode 1 package to dev bucket"

[tasks."video:episode1:regen:dev"]
depends = ["video:episode1:prepare", "video:episode1:publish:dev"]
description = "Regenerate and publish episode 1 to dev"

[tasks."video:dev:reset-and-republish"]
env = { VIDEO_BUCKET_PUBLIC = "copilot-videos-public-dev", VIDEO_BUCKET_PUBLIC_DEV = "copilot-videos-public-dev" }
run = "bash -lc 'set -euo pipefail; gcloud storage rm --recursive \"gs://${VIDEO_BUCKET_PUBLIC_DEV}/**\" || true; for p in video-packages/*/publish.sh; do echo \"Publishing $p\"; bash \"$p\"; done'"
description = "Delete all dev bucket uploads and republish all prepared packages"
