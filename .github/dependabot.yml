version: 2

# @nais/apm is published to GitHub Package Registry (npm.pkg.github.com), which
# requires an authenticated token even for public packages. To let Dependabot
# check @nais/* for updates, uncomment the registry below and add a Dependabot
# secret named NPM_GITHUB_PACKAGES_TOKEN (a PAT with read:packages) under
# Settings > Secrets and variables > Dependabot, then reference it from the
# my-copilot npm update via `registries: [npm-github]`. Until then @nais/apm is
# pinned to an exact version and ignored below so Dependabot does not fail
# trying to reach the registry unauthenticated.
# registries:
#   npm-github:
#     type: npm-registry
#     url: https://npm.pkg.github.com
#     token: ${{ secrets.NPM_GITHUB_PACKAGES_TOKEN }}

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    reviewers:
      - "navikt/copilot"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # my-copilot (Next.js)
  - package-ecosystem: "npm"
    directory: "/apps/my-copilot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    reviewers:
      - "navikt/copilot"
    groups:
      nextjs-core:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      navikt:
        patterns:
          - "@navikt/*"
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@navikt/*"
    ignore:
      - dependency-name: "eslint"
        versions: [">=10"]
      # @nais/apm is pre-1.0 (breaking changes land in minors) and lives on
      # GitHub Package Registry — pinned to an exact version and bumped manually.
      # Remove this once the npm-github registry above is configured.
      - dependency-name: "@nais/apm"
    open-pull-requests-limit: 5

  # copilot-metrics (Go)
  - package-ecosystem: "gomod"
    directory: "/apps/copilot-metrics"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    reviewers:
      - "navikt/copilot"
    groups:
      copilot-metrics-go:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # mcp-onboarding (Go)
  - package-ecosystem: "gomod"
    directory: "/apps/mcp-onboarding"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    reviewers:
      - "navikt/copilot"
    groups:
      mcp-onboarding-go:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # mcp-registry (Go)
  - package-ecosystem: "gomod"
    directory: "/apps/mcp-registry"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    reviewers:
      - "navikt/copilot"
    groups:
      mcp-registry-go:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # nav-pilot installer (Go)
  - package-ecosystem: "gomod"
    directory: "/cli/nav-pilot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    reviewers:
      - "navikt/copilot"
    groups:
      nav-pilot-go:
        patterns:
          - "*"
    open-pull-requests-limit: 5
