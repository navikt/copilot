name: Publish skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'skills/**'
      - 'scripts/next-skills-version.sh'
      - 'scripts/skills-cliff.toml'
      - '.github/workflows/publish-skills.yaml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm'
        required: true

concurrency:
  group: skills-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Upgrade gh CLI (gh skill requires 2.90.0+)
        run: |
          GH_VERSION=2.90.0
          curl -sSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -o /tmp/gh.tar.gz
          tar -xzf /tmp/gh.tar.gz -C /tmp
          sudo cp "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh
          gh --version

      - name: Lint skills
        run: bash scripts/lint-skills.sh

      - name: Validate against agentskills.io spec
        run: gh skill publish --dry-run
        env:
          GH_TOKEN: ${{ github.token }}

  publish:
    name: Publish release
    needs: validate
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'publish')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Upgrade gh CLI (gh skill requires 2.90.0+)
        run: |
          GH_VERSION=2.90.0
          curl -sSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" -o /tmp/gh.tar.gz
          tar -xzf /tmp/gh.tar.gz -C /tmp
          sudo cp "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh
          gh --version

      - name: Compute next version
        id: version
        run: |
          set +e
          VERSION=$(bash scripts/next-skills-version.sh --check)
          rc=$?
          set -e
          if [[ "$rc" -eq 1 ]]; then
            echo "ℹ️  No skills changes since last release, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [[ "$rc" -ne 0 ]]; then
            echo "❌ Version script failed with exit $rc"
            exit "$rc"
          fi
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "📦 Next skills release: ${TAG}"

      - name: Check for existing tag
        if: steps.version.outputs.skip != 'true'
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "⚠️  Tag ${{ steps.version.outputs.tag }} already exists, skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: scripts/skills-cliff.toml
          args: >-
            --unreleased
            --tag ${{ steps.version.outputs.tag }}
            --include-path "skills/**"
            --include-path "skills/**"

      - name: Publish skills
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: |
          gh skill publish --tag "${{ steps.version.outputs.tag }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update release notes
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: |
          gh release edit "${{ steps.version.outputs.tag }}" \
            --latest=false \
            --notes "$CHANGELOG"
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: |
            ## Skills ${{ steps.version.outputs.tag }}

            Agent skills for GitHub Copilot, Claude Code, Cursor, Codex, and Gemini CLI.

            ### Installation

            ```bash
            gh skill install navikt/copilot <skill-name>
            ```

            ${{ steps.changelog.outputs.content }}
