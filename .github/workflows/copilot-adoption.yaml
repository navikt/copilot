name: copilot-adoption build-deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/copilot-adoption/**'
      - '.github/workflows/copilot-adoption.yaml'
      - '.github/workflows/mise-build-deploy-nais.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/copilot-adoption/**'
      - '.github/workflows/copilot-adoption.yaml'
      - '.github/workflows/mise-build-deploy-nais.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    uses: ./.github/workflows/mise-build-deploy-nais.yaml
    with:
      working-directory: apps/copilot-adoption
      mise-setup-tasks: '["install"]'
      mise-tasks: '["lint", "check"]'
      deploys-to-nais: true
      deploy-pr-to-dev: true
      nais-resource: '.nais/naisjob.yaml'
      nais-team: copilot
      nais-clusters: '["dev-gcp", "prod-gcp"]'
