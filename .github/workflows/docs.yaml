name: docs check

on:
  push:
    branches: [main]
    paths:
      - '.github/agents/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/skills/**'
      - 'docs/**'
      - 'README.md'
      - 'scripts/generate-docs/**'
      - '.github/workflows/docs.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.github/agents/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/skills/**'
      - 'docs/**'
      - 'README.md'
      - 'scripts/generate-docs/**'
      - '.github/workflows/docs.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Docs in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version-file: scripts/generate-docs/go.mod
      - run: cd scripts/generate-docs && go run . --check

  skills-lint:
    name: Skills quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - run: bash scripts/lint-skills.sh
