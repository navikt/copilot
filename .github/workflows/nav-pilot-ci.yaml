name: nav-pilot CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/nav-pilot/**'
      - 'scripts/install.sh'
      - '.github/skills/**'
      - '.github/agents/**'
      - '.github/collections/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/workflows/nav-pilot-ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'cli/nav-pilot/**'
      - 'scripts/install.sh'
      - '.github/skills/**'
      - '.github/agents/**'
      - '.github/collections/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/workflows/nav-pilot-ci.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test installer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/nav-pilot/go.mod
          cache: true

      - name: Build
        run: cd cli/nav-pilot && go build -o nav-pilot .

      - name: Test and Coverage
        run: |
          cd cli/nav-pilot && go test -race -v -coverpkg=./... -coverprofile=cover.out ./...
          go tool cover -func=cover.out
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/, "", $NF); print $NF}')
          floor=65
          awk -v t="$total" -v f="$floor" 'BEGIN {
            if (t + 0 < f + 0) {
              print "ERROR: coverage " t "% is below floor " f "%"
              exit 1
            }
            print "Coverage " t "% meets floor " f "%"
          }'
          rm -f cover.out

      - name: Vet
        run: cd cli/nav-pilot && go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          cd cli/nav-pilot && staticcheck ./...

  shellcheck:
    name: Lint install.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ShellCheck
        run: shellcheck scripts/install.sh

  bats:
    name: Unit Test install.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # ratchet:jdx/mise-action@v4.2.0
        with:
          experimental: true

      - name: Run BATS
        run: mise exec -- bats scripts/install.bats

  e2e-install:
    name: E2E test install.sh
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container: ["ubuntu:latest", "alpine:latest"]
    container: ${{ matrix.container }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup prerequisites (Ubuntu)
        if: contains(matrix.container, 'ubuntu')
        run: apt-get update && apt-get install -y curl

      - name: Setup prerequisites (Alpine)
        if: contains(matrix.container, 'alpine')
        run: apk add --no-cache bash curl coreutils

      - name: Run install.sh
        run: bash scripts/install.sh --dir /usr/local/bin

      - name: Verify installation
        run: |
          /usr/local/bin/nav-pilot version
          # Ensure scripts exited 0
