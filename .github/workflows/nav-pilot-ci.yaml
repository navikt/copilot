name: nav-pilot CI

on:
  push:
    branches: [main]
    paths:
      - 'scripts/install-collection/**'
      - 'scripts/install.sh'
      - '.github/workflows/nav-pilot-ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/install-collection/**'
      - 'scripts/install.sh'
      - '.github/workflows/nav-pilot-ci.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test installer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version-file: scripts/install-collection/go.mod
          cache: true

      - name: Build
        run: cd scripts/install-collection && go build -o nav-pilot .

      - name: Test
        run: cd scripts/install-collection && go test -v ./...

      - name: Vet
        run: cd scripts/install-collection && go vet ./...

  shellcheck:
    name: Lint install.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: ShellCheck
        run: shellcheck scripts/install.sh
