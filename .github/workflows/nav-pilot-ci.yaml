name: nav-pilot CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/nav-pilot/**'
      - 'scripts/install.sh'
      - '.github/skills/**'
      - '.github/agents/**'
      - '.github/collections/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/workflows/nav-pilot-ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'cli/nav-pilot/**'
      - 'scripts/install.sh'
      - '.github/skills/**'
      - '.github/agents/**'
      - '.github/collections/**'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - '.github/workflows/nav-pilot-ci.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test installer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/nav-pilot/go.mod
          cache: true

      - name: Build
        run: cd cli/nav-pilot && go build -o nav-pilot .

      - name: Test and Coverage
        run: |
          cd cli/nav-pilot && go test -race -v -coverpkg=./... -coverprofile=cover.out ./...
          go tool cover -func=cover.out
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/, "", $NF); print $NF}')
          floor=65
          awk -v t="$total" -v f="$floor" 'BEGIN {
            if (t + 0 < f + 0) {
              print "ERROR: coverage " t "% is below floor " f "%"
              exit 1
            }
            print "Coverage " t "% meets floor " f "%"
          }'
          rm -f cover.out

      - name: Vet
        run: cd cli/nav-pilot && go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          cd cli/nav-pilot && staticcheck ./...

  shellcheck:
    name: Lint install.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ShellCheck
        run: shellcheck scripts/install.sh
