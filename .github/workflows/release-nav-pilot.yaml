name: Release nav-pilot

on:
  workflow_run:
    workflows: ["nav-pilot CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: nav-pilot-release
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: scripts/install-collection/go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          VERSION="$(date -u +%Y.%m.%d)-${SHORT_SHA}"
          cd scripts/install-collection
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT_SHA} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../../nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nav-pilot-* > SHA256SUMS
          cat SHA256SUMS

      - name: Determine version
        id: version
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DATE=$(date -u +%Y.%m.%d)
          echo "tag=nav-pilot/${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "title=nav-pilot ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          echo "sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --list 'nav-pilot/*' --sort=-version:refname | head -1 || echo "")
          {
            echo "body<<RELEASE_EOF"
            echo "## nav-pilot"
            echo ""
            echo "Nav's institutional AI developer toolkit installer."
            echo ""
            echo "### Installation"
            echo ""
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/navikt/copilot/main/scripts/install.sh | bash"
            echo '```'
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG##*/}"
              echo ""
              git log --oneline "${PREV_TAG}..HEAD" -- scripts/install-collection/ scripts/install.sh .github/skills/ .github/agents/ .github/collections/ | head -20
            else
              echo "### Initial release"
            fi
            echo ""
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ steps.version.outputs.sha }}
          name: ${{ steps.version.outputs.title }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
          files: |
            artifacts/nav-pilot-*
            artifacts/SHA256SUMS

