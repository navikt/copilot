name: Release nav-pilot

on:
  workflow_run:
    workflows: ["nav-pilot CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm'
        required: true

concurrency:
  group: nav-pilot-release
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: Compute version
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.confirm == 'release') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.v.outputs.version }}
      commit_sha: ${{ steps.v.outputs.commit_sha }}
      short_sha: ${{ steps.v.outputs.short_sha }}
      tag: ${{ steps.v.outputs.tag }}
      title: ${{ steps.v.outputs.title }}
    steps:
      - id: v
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DATE=$(date -u +%Y.%m.%d)
          TIME=$(date -u +%H%M%S)
          VERSION="${DATE}-${TIME}-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=nav-pilot/${VERSION}" >> "$GITHUB_OUTPUT"
          echo "title=nav-pilot ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: cli/nav-pilot/go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd cli/nav-pilot
          go build \
            -ldflags="-s -w -X main.version=${{ needs.prepare.outputs.version }} -X main.commit=${{ needs.prepare.outputs.commit_sha }} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../../nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nav-pilot-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nav-pilot-* > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cli/nav-pilot/cliff.toml
          args: --unreleased --tag ${{ needs.prepare.outputs.tag }} --include-path "cli/nav-pilot/*" --include-path "skills/*" --include-path "agents/*" --include-path "collections/*" --include-path "scripts/install.sh"

      - name: Build release body
        id: notes
        env:
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          {
            echo "body<<RELEASE_EOF"
            printf '%s\n' \
              "## nav-pilot" \
              "" \
              "Nav's institutional AI developer toolkit installer." \
              "" \
              "### Installation" \
              "" \
              '```bash' \
              "brew install navikt/tap/nav-pilot" \
              '```' \
              "" \
              "Or on Linux / CI:" \
              "" \
              '```bash' \
              "curl -fsSL https://raw.githubusercontent.com/navikt/copilot/main/scripts/install.sh | bash" \
              '```' \
              ""
            echo "$CHANGELOG"
            echo ""
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.commit_sha }}
          name: ${{ needs.prepare.outputs.title }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            artifacts/nav-pilot-*
            artifacts/SHA256SUMS

